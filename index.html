<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PackTrack — 包材庫存管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F3EF;
    --surface: #FFFFFF;
    --surface2: #F0EDE8;
    --border: #E2DED8;
    --border2: #CBC6BE;
    --text: #1A1816;
    --text2: #6B6560;
    --text3: #A09A93;
    --accent: #2C5F3F;
    --accent-light: #EAF2EC;
    --accent-text: #1E4530;
    --warn: #C4530A;
    --warn-light: #FEF0E7;
    --warn-text: #8B3A07;
    --danger: #B91C1C;
    --danger-light: #FEF2F2;
    --ok: #15803D;
    --ok-light: #F0FDF4;
    --low: #D97706;
    --low-light: #FFFBEB;
    --sidebar-w: 220px;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    min-height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0;
    z-index: 100;
  }

  .sidebar-brand {
    padding: 22px 20px 18px;
    border-bottom: 1px solid var(--border);
  }
  .brand-name {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  .brand-sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
    font-weight: 400;
  }

  .sidebar-account {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .account-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .account-info { min-width: 0; }
  .account-name { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .account-role { font-size: 11px; color: var(--text3); }

  .sidebar-nav { padding: 10px 12px; flex: 1; }
  .nav-section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text3);
    text-transform: uppercase;
    padding: 10px 8px 5px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    color: var(--text2);
    font-size: 13px;
    font-weight: 400;
    transition: background 0.15s, color 0.15s;
    position: relative;
    user-select: none;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent-light); color: var(--accent-text); font-weight: 500; }
  .nav-item .nav-icon { width: 16px; height: 16px; opacity: 0.7; flex-shrink: 0; }
  .nav-item.active .nav-icon { opacity: 1; }
  .nav-badge {
    margin-left: auto;
    background: var(--warn);
    color: #fff;
    font-size: 10px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 10px;
    line-height: 16px;
  }
  .nav-badge.green { background: var(--accent); }

  /* ── MAIN ── */
  .main {
    margin-left: var(--sidebar-w);
    flex: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    height: 56px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 28px;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .page-title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.2px;
    flex: 1;
  }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    border: none;
    font-family: inherit;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-text); }
  .btn-outline { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
  .btn-outline:hover { background: var(--surface2); color: var(--text); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-danger { background: var(--danger-light); color: var(--danger); border: 1px solid #FECACA; }
  .btn-danger:hover { background: #FEE2E2; }

  .content { padding: 24px 28px; flex: 1; }

  /* ── VIEWS ── */
  .view { display: none; }
  .view.active { display: block; }

  /* ── OVERVIEW ── */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow);
  }
  .stat-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-value { font-size: 28px; font-weight: 600; letter-spacing: -1px; color: var(--text); line-height: 1; }
  .stat-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }
  .stat-card.warn { border-color: #FED7AA; background: var(--warn-light); }
  .stat-card.warn .stat-value { color: var(--warn); }
  .stat-card.warn .stat-label { color: var(--warn-text); }

  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .section-title { font-size: 13px; font-weight: 600; color: var(--text); }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  /* ── ALERTS TABLE ── */
  .alert-row {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .alert-row:last-child { border-bottom: none; }
  .alert-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .alert-dot.danger { background: var(--danger); }
  .alert-dot.warn { background: var(--low); }
  .alert-name { flex: 1; font-weight: 500; }
  .alert-stock { color: var(--text2); font-family: 'DM Mono', monospace; font-size: 12px; }
  .alert-safe { color: var(--text3); font-size: 12px; }
  .alert-tag {
    padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500;
  }
  .alert-tag.danger { background: var(--danger-light); color: var(--danger); }
  .alert-tag.warn { background: var(--low-light); color: var(--low); }

  /* ── RECENT ORDERS ── */
  .order-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .order-row:last-child { border-bottom: none; }
  .order-id { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); width: 70px; }
  .order-store { font-weight: 500; flex: 1; }
  .order-date { color: var(--text3); font-size: 12px; }
  .status-badge {
    padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500;
  }
  .status-badge.pending { background: var(--low-light); color: var(--low); }
  .status-badge.processing { background: #EFF6FF; color: #1D4ED8; }
  .status-badge.done { background: var(--ok-light); color: var(--ok); }
  .status-badge.confirm { background: var(--warn-light); color: var(--warn); }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  /* ── INVENTORY TABLE ── */
  .toolbar {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .search-box {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 10px;
    min-width: 200px;
  }
  .search-box input {
    border: none; background: transparent; outline: none;
    font-family: inherit; font-size: 13px; color: var(--text);
    width: 100%;
  }
  .search-box input::placeholder { color: var(--text3); }
  .filter-chips { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
  .chip {
    padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
    border: 1px solid var(--border);
    color: var(--text2); background: transparent;
    font-family: inherit;
  }
  .chip:hover { background: var(--surface2); }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; padding: 10px 14px;
    font-size: 11px; font-weight: 600; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.06em;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    background: var(--surface2);
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 11px 14px; font-size: 13px; }
  .td-code { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); }
  .td-name { font-weight: 500; }
  .td-sub { font-size: 11px; color: var(--text3); }
  .td-num { font-family: 'DM Mono', monospace; font-size: 13px; }

  /* stock level bar */
  .level-wrap { display: flex; align-items: center; gap: 8px; }
  .level-bar { width: 80px; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; flex-shrink: 0; }
  .level-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .level-fill.ok { background: var(--ok); }
  .level-fill.low { background: var(--low); }
  .level-fill.danger { background: var(--danger); }
  .level-text { font-size: 11px; color: var(--text3); white-space: nowrap; }

  .cat-pill {
    display: inline-flex; padding: 2px 7px; border-radius: 4px;
    font-size: 11px; font-weight: 500;
    background: var(--surface2); color: var(--text2);
  }

  /* ── MODAL ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    width: 520px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
  }
  .modal-title { font-size: 15px; font-weight: 600; }
  .modal-close { width: 28px; height: 28px; border-radius: 50%; border: none; background: var(--surface2); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 16px; }
  .modal-body { padding: 22px; }
  .modal-footer { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
  .form-input, .form-select {
    padding: 8px 10px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    font-family: inherit; font-size: 13px; color: var(--text);
    background: var(--surface);
    outline: none; transition: border-color 0.15s;
  }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }

  /* ── ORDER FORM ── */
  .order-table { width: 100%; }
  .order-table th { background: var(--surface2); font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; padding: 8px 10px; }
  .order-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .qty-input {
    width: 70px; padding: 5px 8px;
    border: 1px solid var(--border2); border-radius: var(--radius-sm);
    font-family: 'DM Mono', monospace; font-size: 13px;
    text-align: center; outline: none; background: var(--surface);
  }
  .qty-input:focus { border-color: var(--accent); }

  /* ── RECEIVING ── */
  .receive-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .receive-name { flex: 1; font-size: 13px; font-weight: 500; }
  .receive-current { font-size: 12px; color: var(--text3); width: 60px; text-align: right; }
  .receive-qty {
    width: 80px; padding: 6px 8px;
    border: 1px solid var(--border2); border-radius: var(--radius-sm);
    font-family: 'DM Mono', monospace; font-size: 13px;
    text-align: center; outline: none; background: var(--surface);
  }
  .receive-qty:focus { border-color: var(--accent); }
  .receive-after { font-size: 12px; color: var(--accent); width: 60px; text-align: left; font-weight: 500; }

  /* ── ORDERS RECORDS ── */
  .orders-table td, .orders-table th { padding: 10px 14px; }

  /* ── EMPTY STATE ── */
  .empty { text-align: center; padding: 40px; color: var(--text3); font-size: 13px; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--text); color: #fff;
    padding: 12px 18px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500;
    transform: translateY(80px); opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    box-shadow: var(--shadow-md);
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--accent); }
  .toast.error { background: var(--danger); }

  /* ── ALERT BANNER ── */
  .alert-banner {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    background: var(--warn-light);
    border: 1px solid #FED7AA;
    border-radius: var(--radius-sm);
    font-size: 13px;
    margin-bottom: 20px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .alert-banner:hover { background: #FDE8D0; }
  .alert-banner-icon { font-size: 14px; }
  .alert-banner-text { color: var(--warn-text); flex: 1; }
  .alert-banner-link { color: var(--warn); font-weight: 500; font-size: 12px; text-decoration: none; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* role gate */
  .role-gate { display: none; }
  body.role-store .store-only { display: flex !important; }
  body.role-manager .manager-only { display: flex !important; }

  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  .inline-num { font-family: 'DM Mono', monospace; }
</style>
</head>
<body>

<!-- ── SIDEBAR ── -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-name">PackTrack</div>
    <div class="brand-sub">包材庫存管理系統</div>
  </div>
  <div class="sidebar-account" id="account-area">
    <div class="account-avatar" id="av-initials">LM</div>
    <div class="account-info">
      <div class="account-name" id="account-name">物流經理</div>
      <div class="account-role" id="account-role">總部 · 全權限</div>
    </div>
  </div>
  <nav class="sidebar-nav" id="nav-area">
    <!-- injected by JS -->
  </nav>
</aside>

<!-- ── MAIN ── -->
<div class="main">
  <header class="topbar">
    <div class="page-title" id="page-title">總覽</div>
    <div class="topbar-actions">
      <select class="form-select btn-sm" id="role-switcher" onchange="switchRole(this.value)" style="font-size:12px; padding:5px 8px;">
        <option value="manager">👤 物流經理</option>
        <option value="warehouse">🏭 總部倉庫</option>
        <option value="store">🏪 門市店長（示範）</option>
      </select>
    </div>
  </header>

  <div class="content">

    <!-- ── VIEW: OVERVIEW ── -->
    <div class="view active" id="view-overview">
      <div class="alert-banner" id="alert-banner" onclick="showView('inventory')">
        <span class="alert-banner-icon">⚠</span>
        <span class="alert-banner-text" id="alert-banner-text">載入中...</span>
        <span class="alert-banner-link">前往庫存管理 →</span>
      </div>

      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-label">總品項數</div>
          <div class="stat-value" id="stat-total">—</div>
          <div class="stat-sub">active SKUs</div>
        </div>
        <div class="stat-card warn" id="stat-low-card">
          <div class="stat-label">庫存不足</div>
          <div class="stat-value" id="stat-low">—</div>
          <div class="stat-sub">低於4個月安全水位</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">本月訂單</div>
          <div class="stat-value" id="stat-orders">—</div>
          <div class="stat-sub">筆門市訂購單</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">待處理出庫</div>
          <div class="stat-value" id="stat-pending">—</div>
          <div class="stat-sub">待確認發出</div>
        </div>
      </div>

      <div class="two-col">
        <div>
          <div class="section-header">
            <div class="section-title">庫存警示</div>
            <button class="btn btn-outline btn-sm" onclick="showView('inventory')">查看全部</button>
          </div>
          <div class="card" id="alert-list">
            <div class="empty">載入中...</div>
          </div>
        </div>
        <div>
          <div class="section-header">
            <div class="section-title">最近訂單</div>
            <button class="btn btn-outline btn-sm" onclick="showView('records')">查看全部</button>
          </div>
          <div class="card" id="recent-orders">
            <div class="empty">載入中...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── VIEW: INVENTORY ── -->
    <div class="view" id="view-inventory">
      <div class="card">
        <div class="toolbar">
          <div class="search-box">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color:var(--text3);flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" placeholder="搜尋貨號或品名..." id="inv-search" oninput="renderInventory()">
          </div>
          <div class="filter-chips" id="inv-chips"></div>
          <button class="btn btn-primary btn-sm" onclick="openAddItem()">＋ 新增品項</button>
        </div>
        <table id="inv-table">
          <thead>
            <tr>
              <th>貨號</th>
              <th>品名</th>
              <th>類別</th>
              <th>單位</th>
              <th style="text-align:right">現有庫存</th>
              <th style="text-align:right">安全水位</th>
              <th>庫存狀態</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="inv-body"></tbody>
        </table>
      </div>
    </div>

    <!-- ── VIEW: NEW ORDER (store) ── -->
    <div class="view" id="view-order">
      <div class="card" style="max-width: 640px;">
        <div class="toolbar">
          <div class="search-box" style="flex:1">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color:var(--text3);flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" placeholder="搜尋品名..." id="ord-search" oninput="renderOrderItems()">
          </div>
          <div class="filter-chips" id="ord-chips"></div>
        </div>
        <table class="order-table">
          <thead>

<div class="toast" id="toast"></div>

<script>
// ─── DATA ───────────────────────────────────────────────
const CATEGORIES = ['全部','珠寶盒','購物袋','說明卡','拭銀布','氣泡袋','包裝材料','緞帶','手套','其他'];

let items = [
  {id:'3830419', name:'珠寶盒 12×12×11', cat:'珠寶盒', unit:'個', stock:45, annual:180, safeMonths:4},
  {id:'3830421', name:'珠寶盒 17×12×13', cat:'珠寶盒', unit:'個', stock:30, annual:120, safeMonths:4, note:'1箱5個'},
  {id:'3830423', name:'珠寶盒 27×18×19', cat:'珠寶盒', unit:'個', stock:28, annual:96,  safeMonths:4},

  {id:'3830429', name:'珠寶盒 41×41×40', cat:'珠寶盒', unit:'個', stock:4,  annual:48,  safeMonths:4, note:'1PCS/CTN'},
  {id:'3830431', name:'珠寶盒 33×33×5',  cat:'珠寶盒', unit:'個', stock:22, annual:96,  safeMonths:4},
  {id:'3830443', name:'珠寶盒 50×45×57', cat:'珠寶盒', unit:'個', stock:3,  annual:36,  safeMonths:4, note:'1PCS/CTN'},
  {id:'3830446', name:'珠寶盒 78×53×20', cat:'珠寶盒', unit:'個', stock:2,  annual:48,  safeMonths:4},
  {id:'B001',    name:'購物袋 小',        cat:'購物袋', unit:'個', stock:200, annual:600, safeMonths:4},
  {id:'B002',    name:'購物袋 中',        cat:'購物袋', unit:'個', stock:180, annual:720, safeMonths:4},
  {id:'B003',    name:'購物袋 大',        cat:'購物袋', unit:'個', stock:60,  annual:360, safeMonths:4},
  {id:'C001',    name:'說明卡（中文）',   cat:'說明卡', unit:'張', stock:500, annual:2400, safeMonths:4},
  {id:'C002',    name:'說明卡（英文）',   cat:'說明卡', unit:'張', stock:80,  annual:600,  safeMonths:4},
  {id:'D001',    name:'拭銀布（小）',     cat:'拭銀布', unit:'條', stock:300, annual:1200, safeMonths:4},
  {id:'D002',    name:'拭銀布（大）',     cat:'拭銀布', unit:'條', stock:45,  annual:360,  safeMonths:4},
  {id:'E001',    name:'氣泡袋 10×15',    cat:'氣泡袋', unit:'個', stock:400, annual:1800, safeMonths:4},
  {id:'F001',    name:'緞帶（金色）',     cat:'緞帶',   unit:'條', stock:12,  annual:240,  safeMonths:4},
  {id:'F002',    name:'緞帶（黑色）',     cat:'緞帶',   unit:'條', stock:8,   annual:180,  safeMonths:4},
  {id:'G001',    name:'手套（白棉）',     cat:'手套',   unit:'雙', stock:50,  annual:360,  safeMonths:4},
];

let orders = [
  {id:'GJ-0041', store:'信義旗艦店', storeCode:'ST-001', date:'2025-03-10', status:'已完成', items:[{id:'3830419',name:'珠寶盒 12×12×11',qty:10},{id:'B001',name:'購物袋 小',qty:50}]},
  {id:'GJ-0040', store:'南西門市',   storeCode:'ST-002', date:'2025-03-08', status:'處理中', items:[{id:'C001',name:'說明卡（中文）',qty:100}]},
  {id:'GJ-0039', store:'新竹巨城',   storeCode:'HK-001', date:'2025-03-05', status:'已完成', items:[{id:'D001',name:'拭銀布（小）',qty:30},{id:'B002',name:'購物袋 中',qty:20}]},
  {id:'GJ-0038', store:'台中勤美',   storeCode:'TC-001', date:'2025-02-28', status:'待確認', items:[{id:'3830446',name:'珠寶盒 78×53×20',qty:5},{id:'F001',name:'緞帶（金色）',qty:10}]},
  {id:'GJ-0037', store:'台南新光',   storeCode:'TN-001', date:'2025-02-20', status:'已完成', items:[{id:'G001',name:'手套（白棉）',qty:20}]},
];

let currentRole = 'manager';
let currentView = 'overview';
let editingItemId = null;
let invCatFilter = '全部';
let ordCatFilter = '全部';
let recFilter = 'all';

const STORES = [
  '信義旗艦店','南西門市','新竹巨城','台中勤美','台南新光',
  '高雄漢神','板橋新埔','桃園統領','台中中港','台北SOGO',
  '新竹遠百','嘉義耐斯','高雄夢時代','台南南紡','花蓮遠百'
];
const STORE_CODES = ['ST-001','ST-002','HK-001','TC-001','TN-001','KH-001','BQ-001','TY-001','TC-002','TB-001','HC-001','CY-001','KH-002','TN-002','HL-001'];

// ─── HELPERS ────────────────────────────────────────────
function safeLevel(item) {
  if (!item.annual) return {level:100, status:'ok'};
  const safeQty = item.annual / 12 * item.safeMonths;
  const lvl = Math.min(100, Math.round(item.stock / safeQty * 100));
  const status = lvl <= 0 ? 'danger' : lvl < 50 ? 'low' : 'ok';
  return {level: lvl, status, safeQty: Math.round(safeQty)};
}
function lowItems() { return items.filter(i => safeLevel(i).status !== 'ok'); }

function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 2600);
}

function statusClass(s) {
  if (s==='已完成') return 'done';
  if (s==='處理中') return 'processing';
  if (s==='待確認') return 'pending';
  if (s==='待出庫') return 'confirm';
  return '';
}

function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function nextOrderId() {
  const max = orders.reduce((m,o) => Math.max(m, parseInt(o.id.replace('GJ-',''))||0), 0);
  return 'GJ-' + String(max+1).padStart(4,'0');
}

// ─── ROLE ────────────────────────────────────────────────
function switchRole(role) {
  currentRole = role;
  const nav = document.getElementById('nav-area');
  const avEl = document.getElementById('av-initials');
  const nameEl = document.getElementById('account-name');
  const roleEl = document.getElementById('account-role');

  let navItems = [];

  if (role === 'manager') {
    avEl.textContent = 'LM'; nameEl.textContent = '物流經理'; roleEl.textContent = '總部 · 全權限';
    navItems = [
      {id:'overview', label:'總覽', icon:homeIcon()},
      {id:'inventory', label:'庫存管理', icon:boxIcon()},
      {id:'records', label:'訂購紀錄', icon:listIcon()},
      {id:'receiving', label:'入庫作業', icon:inboxIcon()},
    ];
    showView('overview');
  } else if (role === 'warehouse') {
    avEl.textContent = 'WH'; nameEl.textContent = '總部倉庫'; roleEl.textContent = '倉庫人員';
    navItems = [
      {id:'inventory', label:'庫存管理', icon:boxIcon()},
      {id:'receiving', label:'入庫作業', icon:inboxIcon()},
    ];
    showView('inventory');
  } else {
    const idx = Math.floor(Math.random()*15);
    avEl.textContent = 'ST'; nameEl.textContent = STORES[idx]; roleEl.textContent = '門市店長';
    navItems = [
      {id:'order', label:'訂購包材', icon:cartIcon()},
    ];
    showView('order');
  }

  nav.innerHTML = navItems.map(n => `
    <div class="nav-item ${n.id===currentView?'active':''}" id="nav-${n.id}" onclick="showView('${n.id}')">
      ${n.icon} ${n.label}
      ${n.id==='overview' && lowItems().length > 0 ? `<span class="nav-badge">${lowItems().length}</span>` : ''}
    </div>
  `).join('');
}

// ─── NAVIGATION ─────────────────────────────────────────
function showView(v) {
  currentView = v;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v)?.classList.add('active');

  const titles = {overview:'總覽', inventory:'庫存管理', order:'新增訂購', records:'訂購紀錄', receiving:'入庫作業'};
  document.getElementById('page-title').textContent = titles[v] || v;

  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + v)?.classList.add('active');

  if (v === 'overview') renderOverview();
  if (v === 'inventory') renderInventory();
  if (v === 'order') renderOrderItems();
  if (v === 'records') renderRecords();
  if (v === 'receiving') renderReceiving();
}

// ─── OVERVIEW ────────────────────────────────────────────
function renderOverview() {
  const low = lowItems();
  const pending = orders.filter(o => o.status === '待確認').length;
  const monthOrders = orders.length;

  document.getElementById('stat-total').textContent = items.length;
  document.getElementById('stat-low').textContent = low.length;
  document.getElementById('stat-orders').textContent = monthOrders;
  document.getElementById('stat-pending').textContent = pending;

  // banner
  const banner = document.getElementById('alert-banner');
  const bannerText = document.getElementById('alert-banner-text');
  if (low.length > 0) {
    banner.style.display = 'flex';
    bannerText.textContent = `${low.length} 項商品庫存低於安全水位。`;
  } else {
    banner.style.display = 'none';
  }

  // alert list
  const al = document.getElementById('alert-list');
  if (low.length === 0) {
    al.innerHTML = '<div class="empty">✓ 所有品項庫存正常</div>';
  } else {
    al.innerHTML = low.map(item => {
      const {level, status, safeQty} = safeLevel(item);
      return `<div class="alert-row">
        <div class="alert-dot ${status}"></div>
        <div class="alert-name">${item.name}</div>
        <div class="alert-stock">${item.stock} ${item.unit}</div>
        <div class="alert-safe">/ 安全 ${safeQty}</div>
        <div class="alert-tag ${status}">${status === 'danger' ? '庫存不足' : '偏低'}</div>
      </div>`;
    }).join('');
  }

  // recent orders
  const ro = document.getElementById('recent-orders');
  const recent = [...orders].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  ro.innerHTML = recent.map(o => `
    <div class="order-row" style="cursor:pointer" onclick="openOrderDetail('${o.id}')">
      <div class="order-id">${o.id}</div>
      <div class="order-store">${o.store}</div>
      <div class="order-date">${o.date}</div>
      <span class="status-badge ${statusClass(o.status)}">${o.status}</span>
    </div>
  `).join('');
}

// ─── INVENTORY ───────────────────────────────────────────
function renderInventory() {
  // chips
  const chips = document.getElementById('inv-chips');
  chips.innerHTML = CATEGORIES.map(c => `
    <button class="chip ${c===invCatFilter?'active':''}" onclick="setInvCat('${c}')">${c}</button>
  `).join('');

  const q = document.getElementById('inv-search').value.toLowerCase();
  let list = items.filter(i =>
    (invCatFilter === '全部' || i.cat === invCatFilter) &&
    (i.name.toLowerCase().includes(q) || i.id.includes(q))
  );

  const tbody = document.getElementById('inv-body');
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty">無符合的品項</td></tr>';
    return;
  }

  tbody.innerHTML = list.map(item => {
    const {level, status, safeQty} = safeLevel(item);
    return `<tr>
      <td class="td-code">${item.id}</td>
      <td>
        <div class="td-name">${item.name}</div>
        ${item.note ? `<div class="td-sub">${item.note}</div>` : ''}
      </td>
      <td><span class="cat-pill">${item.cat}</span></td>
      <td style="color:var(--text3)">${item.unit}</td>
      <td style="text-align:right"><span class="td-num">${item.stock}</span></td>
      <td style="text-align:right"><span class="td-num" style="color:var(--text3)">${safeQty}</span></td>
      <td>
        <div class="level-wrap">
          <div class="level-bar"><div class="level-fill ${status}" style="width:${Math.max(2,level)}%"></div></div>
          <div class="level-text">${level}%</div>
        </div>
      </td>
      <td>
        <div style="display:flex;gap:6px">
          ${currentRole==='manager' ? `<button class="btn btn-outline btn-sm" onclick="openEditItem('${item.id}')">編輯</button>` : ''}
          ${currentRole==='manager' ? `<button class="btn btn-outline btn-sm" onclick="orderItem('${item.id}')">快速訂購</button>` : ''}
        </div>
      </td>
    </tr>`;
  }).join('');
}

function setInvCat(c) { invCatFilter = c; renderInventory(); }

// ─── ITEM MODAL ──────────────────────────────────────────
function openAddItem() {
  editingItemId = null;
  document.getElementById('item-modal-title').textContent = '新增品項';
  ['item-code','item-name','item-unit','item-stock','item-annual'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('item-safemonths').value = 4;
  openModal('modal-item');
}

function openEditItem(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  editingItemId = id;
  document.getElementById('item-modal-title').textContent = '編輯品項';
  document.getElementById('item-code').value = item.id;
  document.getElementById('item-name').value = item.name;
  document.getElementById('item-unit').value = item.unit;
  document.getElementById('item-cat').value = item.cat;
  document.getElementById('item-stock').value = item.stock;
  document.getElementById('item-annual').value = item.annual;
  document.getElementById('item-safemonths').value = item.safeMonths;
  openModal('modal-item');
}

function saveItem() {
  const code = document.getElementById('item-code').value.trim();
  const name = document.getElementById('item-name').value.trim();
  const unit = document.getElementById('item-unit').value.trim();
  const cat  = document.getElementById('item-cat').value;
  const stock = parseInt(document.getElementById('item-stock').value) || 0;
  const annual = parseInt(document.getElementById('item-annual').value) || 0;
  const safeMonths = parseInt(document.getElementById('item-safemonths').value) || 4;

  if (!code || !name || !unit) { toast('請填寫必要欄位', 'error'); return; }

  if (editingItemId) {
    const idx = items.findIndex(i => i.id === editingItemId);
    if (idx >= 0) items[idx] = {...items[idx], id:code, name, unit, cat, stock, annual, safeMonths};
    toast('品項已更新', 'success');
  } else {
    if (items.find(i => i.id === code)) { toast('貨號已存在', 'error'); return; }
    items.push({id:code, name, cat, unit, stock, annual, safeMonths});
    toast('品項已新增', 'success');
  }
  closeModal('modal-item');
  renderInventory();
}

// ─── ORDER FORM (store) ──────────────────────────────────
function renderOrderItems() {
  const chips = document.getElementById('ord-chips');
  chips.innerHTML = CATEGORIES.map(c => `
    <button class="chip ${c===ordCatFilter?'active':''}" onclick="setOrdCat('${c}')">${c}</button>
  `).join('');

  const q = document.getElementById('ord-search').value.toLowerCase();
  let list = items.filter(i =>
    (ordCatFilter === '全部' || i.cat === ordCatFilter) &&
    (i.name.toLowerCase().includes(q))
  );

  const tbody = document.getElementById('ord-body');
  tbody.innerHTML = list.map(item => `
    <tr>
      <td>
        <div style="font-weight:500;font-size:13px">${item.name}</div>
        ${item.note ? `<div class="td-sub">${item.note}</div>` : ''}
      </td>
      <td style="color:var(--text3)">${item.unit}</td>
      <td style="text-align:right">
        <input type="number" class="qty-input" id="oq-${item.id}" min="0" value="0"
          oninput="updateOrderCount()">
      </td>
    </tr>
  `).join('');
  updateOrderCount();
}

function setOrdCat(c) { ordCatFilter = c; renderOrderItems(); }

function updateOrderCount() {
  let count = 0;
  document.querySelectorAll('.qty-input').forEach(el => {
    if (parseInt(el.value) > 0) count++;
  });
  document.getElementById('ord-count').textContent = count;
}

function submitOrder() {
  const nameEl = document.getElementById('account-name');
  const storeName = nameEl.textContent;
  const orderItems = [];
  items.forEach(item => {
    const el = document.getElementById('oq-' + item.id);
    if (el && parseInt(el.value) > 0) {
      orderItems.push({id: item.id, name: item.name, qty: parseInt(el.value)});
    }
  });
  if (orderItems.length === 0) { toast('請選擇至少一項商品', 'error'); return; }

  const newOrder = {
    id: nextOrderId(),
    store: storeName,
    storeCode: 'ST-XXX',
    date: new Date().toISOString().slice(0,10),
    status: '待確認',
    items: orderItems
  };
  orders.unshift(newOrder);
  toast(`訂單 ${newOrder.id} 已送出`, 'success');
  renderOrderItems();
}

function orderItem(id) {
  switchRole('store');
  document.getElementById('role-switcher').value = 'store';
  setTimeout(() => {
    const el = document.getElementById('oq-' + id);
    if (el) { el.value = 1; el.focus(); updateOrderCount(); }
  }, 100);
}

// ─── RECORDS ─────────────────────────────────────────────
function setRecFilter(f, el) {
  recFilter = f;
  document.querySelectorAll('#rec-status-chips .chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderRecords();
}

function renderRecords() {
  let list = recFilter === 'all' ? orders : orders.filter(o => o.status === recFilter);
  const tbody = document.getElementById('rec-body');
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty">無訂單紀錄</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(o => `
    <tr>
      <td class="td-code" style="font-size:13px">${o.id}</td>
      <td style="font-weight:500">${o.store}</td>
      <td style="color:var(--text3)">${o.date}</td>
      <td style="color:var(--text3)">${o.items.length} 項</td>
      <td><span class="status-badge ${statusClass(o.status)}">${o.status}</span></td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-outline btn-sm" onclick="openOrderDetail('${o.id}')">查看</button>
          ${currentRole==='manager' && o.status==='待確認' ? `<button class="btn btn-primary btn-sm" onclick="advanceOrder('${o.id}')">開始處理</button>` : ''}
          ${currentRole==='manager' && o.status==='處理中' ? `<button class="btn btn-primary btn-sm" onclick="completeOrder('${o.id}')">確認完成</button>` : ''}
        </div>
      </td>
    </tr>
  `).join('');
}

function openOrderDetail(id) {
  const o = orders.find(x => x.id === id);
  if (!o) return;
  document.getElementById('od-title').textContent = `訂單 ${o.id} — ${o.store}`;
  document.getElementById('od-body').innerHTML = `
    <div style="display:flex;gap:20px;margin-bottom:16px;font-size:13px;color:var(--text2)">
      <span>日期：<strong>${o.date}</strong></span>
      <span>狀態：<span class="status-badge ${statusClass(o.status)}">${o.status}</span></span>
    </div>
    <table style="width:100%">
      <thead><tr>
        <th style="text-align:left;padding:7px 10px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;background:var(--surface2)">品名</th>
        <th style="text-align:right;padding:7px 10px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;background:var(--surface2)">數量</th>
      </tr></thead>
      <tbody>${o.items.map(i=>`<tr><td style="padding:9px 10px;font-size:13px;border-bottom:1px solid var(--border)">${i.name}</td><td style="padding:9px 10px;font-size:13px;font-family:'DM Mono',monospace;text-align:right;border-bottom:1px solid var(--border)">${i.qty}</td></tr>`).join('')}</tbody>
    </table>
  `;
  let footerHTML = `<button class="btn btn-outline" onclick="closeModal('modal-order-detail')">關閉</button>`;
  if (currentRole === 'manager') {
    if (o.status === '待確認') footerHTML += `<button class="btn btn-primary" onclick="advanceOrder('${o.id}');closeModal('modal-order-detail')">開始處理</button>`;
    if (o.status === '處理中') footerHTML += `<button class="btn btn-primary" onclick="completeOrder('${o.id}');closeModal('modal-order-detail')">確認完成並扣庫存</button>`;
  }
  document.getElementById('od-footer').innerHTML = footerHTML;
  openModal('modal-order-detail');
}

function advanceOrder(id) {
  const o = orders.find(x => x.id === id);
  if (o) { o.status = '處理中'; renderRecords(); renderOverview(); toast(`${o.id} 狀態已更新為處理中`); }
}

function completeOrder(id) {
  const o = orders.find(x => x.id === id);
  if (!o) return;
  // deduct stock
  o.items.forEach(oi => {
    const item = items.find(i => i.id === oi.id);
    if (item) item.stock = Math.max(0, item.stock - oi.qty);
  });
  o.status = '已完成';
  renderRecords(); renderOverview();
  toast(`${o.id} 已完成，庫存已扣減`, 'success');
}

// ─── RECEIVING ────────────────────────────────────────────
function renderReceiving() {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('recv-date').value = today;

  const body = document.getElementById('recv-body');
  body.innerHTML = items.map(item => `
    <div class="receive-item">
      <div class="receive-name">
        <div style="font-size:13px;font-weight:500">${item.name}</div>
        <div style="font-size:11px;color:var(--text3)">${item.cat}</div>
      </div>
      <div class="receive-current td-num">${item.stock}</div>
      <input type="number" class="receive-qty" id="rq-${item.id}" min="0" value="" placeholder="0"
        oninput="updateRecvAfter('${item.id}')">
      <div class="receive-after" id="ra-${item.id}">—</div>
    </div>
  `).join('');
}

function updateRecvAfter(id) {
  const item = items.find(i => i.id === id);
  const el = document.getElementById('rq-' + id);
  const after = document.getElementById('ra-' + id);
  const qty = parseInt(el.value) || 0;
  after.textContent = qty > 0 ? (item.stock + qty) : '—';
}

function clearReceiving() {
  document.querySelectorAll('.receive-qty').forEach(el => el.value = '');
  document.querySelectorAll('[id^="ra-"]').forEach(el => el.textContent = '—');
  toast('已清除');
}

function confirmReceiving() {
  let count = 0;
  items.forEach(item => {
    const el = document.getElementById('rq-' + item.id);
    const qty = parseInt(el?.value) || 0;
    if (qty > 0) { item.stock += qty; count++; }
  });
  if (count === 0) { toast('請輸入至少一項入庫數量', 'error'); return; }
  toast(`已入庫 ${count} 項商品`, 'success');
  renderReceiving();
}

// ─── INIT ────────────────────────────────────────────────
switchRole('manager');
</script>
</body>
